<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Science+Gothic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            padding-top: 30px;
            justify-content: center;
            background-color: #b0fffa45;
        }

        main {
            display: flex;
            border: none;
            box-shadow: inset 0 0 50px #ff77009b;
            width: 300px;
            height: 567px;
            border-radius: 39px;
            background: #FFD54F;
            padding: 15px;
            flex-direction: column;
            justify-content: space-between;
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
            padding: 50px
        }

        .ui {
            text-align: center;
            padding: 5px;
            font-family: "Science Gothic", sans-serif;
        }

        #icon {
            font-size: 50px;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.423);
        }

        #icon {
            font-size: 50px;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.423);
            transition: transform 0.6s ease;
            /* smooth return */
        }

        #icon:hover {
            transform: rotate(360deg);
        }


        #city {
            text-shadow: 0 0 20px #b0fffa;
            font-size: 32px;
            padding: 0px;
        }

        #temp {
            text-shadow: 0 0 2px;
            padding: 0px;
        }

        #condition {
            font-size: 27px;
            text-shadow: 0 0 10px #FAFFCB;
            padding: 20px;
            font-weight: 600;
        }

        button {
            font-family: "Science Gothic", sans-serif;
            font-weight: 600;
        }

        .button {
            margin: 15px;
        }

        .button button {
            padding: 10px;
            cursor: pointer;
            border-radius: 10px 1px;
            border: none;
            height: 58px;
            font-size: 14px;
            color: #ff00005a;
            background-color: #FAFFCB;
        }

        .button button:hover {
            /* background-color: #00ffee; */
            box-shadow: inset 0 0 10px #ffffff;
        }

        .button button:active {
            box-shadow: inset 0 0 30px #ffffff,
                0 0 100px white;
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <main>
        <div class="container">
            <h2 id="city" class="ui">Chennai</h2>
            <h1 id="temp" class="ui">32°C</h1>
            <div id="icon" class="ui">☀️</div>
            <p id="condition" class="ui">Sunny</p>
            <div class="ui button">
                <button>Change Weather</button>
            </div>
        </div>
    </main>
    <script>
        const weatherData = [
            {
                city: "Chennai",
                temp: "32°C",
                icon: "☀️",
                condition: "Sunny",
                bg: "#FFD54F",
                glow: "#FFB300",
                text: "#1a1a1a"
            },
            {
                city: "Chennai",
                temp: "27°C",
                icon: "🌧️",
                condition: "Rainy",
                bg: "#1E3A5F",
                glow: "#4DA6FF",
                text: "#EAF4FF"
            },
            {
                city: "Chennai",
                temp: "29°C",
                icon: "☁️",
                condition: "Cloudy",
                bg: "#6D7C85",
                glow: "#D1D5DB",
                text: "#F5F7FA"
            },
            {
                city: "Chennai",
                temp: "25°C",
                icon: "⛈️",
                condition: "Stormy",
                bg: "#0F172A",
                glow: "#7C3AED",
                text: "#EDE9FE"
            }
        ];

        let index = 0;

        const uiElements = document.querySelectorAll("#city, #temp, #condition");

        const city = document.getElementById("city");
        const temp = document.getElementById("temp");
        const icon = document.getElementById("icon");
        const condition = document.getElementById("condition");
        const main = document.querySelector("main");
        const button = document.querySelector("button");

        button.addEventListener("click", changeWeather);

        function changeWeather() {
            index++;

            if (index >= weatherData.length) {
                index = 0;
            }

            const weather = weatherData[index];

            city.textContent = weather.city;
            temp.textContent = weather.temp;
            icon.textContent = weather.icon;
            condition.textContent = weather.condition;

            uiElements.forEach(el => {
                el.style.color = weather.text;
            });

            main.style.background = weather.bg;
            main.style.boxShadow = `inset 0 0 50px ${weather.glow}`;
        }
    </script>
</body>

</html>
